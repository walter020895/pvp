  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:   #0B0B09;
      --cream:   #EDE8DA;      /* Warm cream */
      --olive:   #F7D794;      /* Champagne */
      --rose:    #EDA6A3;      /* Dusty Rose */
      --navy:    #192A56;      /* Midnight Navy */
      --ink:     #192A56;      /* Midnight Navy — primary text */
      --tc:      #EDE8DA;      /* Warm cream — text on dark */
      --muted:   rgba(25,42,86,0.45);
      --border:  rgba(25,42,86,0.1);
      --radius:  18px;
    }

    html { font-size: 16px; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--black);
      color: var(--ink);
      overflow-x: hidden;
    }

    /* ── HEADER ──────────────────────────────────────── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 300;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(1.5rem, 5vw, 3rem);
      background: rgba(11,11,9,0.96);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(237,232,218,0.07);
    }

    .header-logo {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: rgba(237,232,218,0.5);
      text-transform: uppercase;
    }

    /* Progress */
    #progress-line {
      position: fixed;
      top: 52px; left: 0;
      height: 2px;
      background: var(--olive);
      width: 0%;
      z-index: 299;
      transition: width 0.3s ease;
    }

    /* Toggle */
    .mode-toggle {
      display: flex;
      align-items: center;
      background: rgba(237,232,218,0.08);
      border-radius: 100px;
      padding: 3px;
      border: 1px solid rgba(237,232,218,0.1);
    }

    .mode-toggle button {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 5px 14px;
      border: none;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.15s ease;
      background: transparent;
      color: rgba(237,232,218,0.45);
    }

    .mode-toggle button.active {
      background: var(--cream);
      color: var(--ink);
    }

    /* ── STEP MODE ──────────────────────────────────── */
    #step-mode {
      min-height: 100vh;
      padding-top: 52px;
      display: flex;
      flex-direction: column;
    }

    #step-mode.hidden,
    #read-mode.hidden { display: none; }

    .step-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0 0 5rem;
      background: var(--black);
    }

    /* Section band above card */
    .section-band {
      background: var(--olive);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 1rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-band-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(25,42,86,0.65);
    }

    .section-band-dots {
      display: flex;
      gap: 6px;
    }

    .band-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      border: 1.5px solid rgba(25,42,86,0.35);
      background: transparent;
    }

    .band-dot.filled {
      background: var(--tc);
      border-color: var(--tc);
    }

    /* Main card */
    .step-card {
      background: var(--cream);
      border-radius: 0 0 var(--radius) var(--radius);
      padding: 3rem clamp(2rem, 6vw, 4.5rem) 4rem;
      position: relative;
    }

    .step-card-wrap {
      margin: 2rem 0 0;
    }

    /* Part label inside card */
    .part-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.75rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .part-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Step content typography */
    .step-body h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 700;
      font-size: clamp(2.8rem, 7.5vw, 5.5rem);
      line-height: 1.02;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin-bottom: 2.5rem;
    }

    .step-body h2 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 700;
      font-size: clamp(1.25rem, 2.5vw, 1.75rem);
      letter-spacing: -0.01em;
      margin: 2.5rem 0 0.9rem;
    }

    .step-body h3 {
      font-family: 'Space Mono', monospace;
      font-weight: 400;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--rose);
      margin: 2rem 0 0.6rem;
    }

    .step-body p {
      font-family: 'Lora', Georgia, serif;
      font-size: 1.08rem;
      line-height: 1.85;
      color: var(--ink);
      margin-bottom: 1.25rem;
    }

    .step-body ul,
    .step-body ol {
      padding-left: 1.5rem;
      margin-bottom: 1.25rem;
    }

    .step-body li {
      font-family: 'Lora', Georgia, serif;
      font-size: 1.08rem;
      line-height: 1.8;
      margin-bottom: 0.35rem;
    }

    .step-body blockquote {
      border-left: 3px solid var(--rose);
      padding: 0.5rem 0 0.5rem 1.5rem;
      margin: 1.75rem 0;
      color: var(--muted);
      font-style: italic;
    }

    .step-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.5rem 0;
    }

    .step-body strong {
      font-weight: 700;
    }

    /* Tables */
    .step-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.75rem 0;
      font-size: 0.9rem;
    }

    .step-body th {
      text-align: left;
      font-family: 'Space Mono', monospace;
      font-weight: 400;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      padding: 0.5rem 1rem 0.5rem 0;
    }

    .step-body td {
      font-family: 'Lora', Georgia, serif;
      padding: 0.75rem 1rem 0.75rem 0;
      border-bottom: 1px solid rgba(25,42,86,0.06);
      line-height: 1.6;
      vertical-align: top;
    }

    /* Code */
    .step-body pre {
      background: rgba(25,42,86,0.04);
      border: 1px solid rgba(25,42,86,0.08);
      border-radius: 8px;
      padding: 1.5rem 1.75rem;
      margin: 1.75rem 0;
      overflow-x: auto;
      position: relative;
    }

    .step-body code {
      font-family: 'Space Mono', monospace;
      font-size: 0.82rem;
      line-height: 1.7;
      color: var(--ink);
    }

    .step-body :not(pre) > code {
      background: rgba(25,42,86,0.06);
      padding: 0.15em 0.45em;
      border-radius: 3px;
      font-size: 0.85em;
    }

    /* Copy button */
    .copy-btn {
      position: absolute;
      top: 0.75rem; right: 0.75rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 4px 10px;
      background: var(--olive);
      color: var(--tc);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .copy-btn:hover { opacity: 0.8; }
    .copy-btn.copied { opacity: 0.6; }

    /* Checkboxes */
    .step-body input[type="checkbox"] {
      width: 15px; height: 15px;
      accent-color: var(--olive);
      margin-right: 0.6rem;
      cursor: pointer;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    .step-body li:has(input[type="checkbox"]) {
      list-style: none;
      margin-left: -1.5rem;
      padding: 0.3rem 0;
    }

    /* ── STEP NAV ────────────────────────────────────── */
    #step-foot {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(1.5rem, 5vw, 3rem);
      padding-bottom: max(0px, env(safe-area-inset-bottom));
      background: rgba(11,11,9,0.96);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(237,232,218,0.07);
      z-index: 200;
    }

    #step-foot.hidden { display: none; }

    .nav-btn {
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 8px 20px;
      background: transparent;
      border: 1px solid rgba(237,232,218,0.2);
      border-radius: 100px;
      cursor: pointer;
      color: rgba(237,232,218,0.6);
      transition: all 0.15s;
    }

    .nav-btn:hover {
      border-color: rgba(237,232,218,0.5);
      color: var(--tc);
    }

    .nav-btn:disabled { opacity: 0.2; cursor: default; }

    .nav-btn.primary {
      background: var(--cream);
      color: var(--ink);
      border-color: var(--cream);
    }

    .nav-btn.primary:hover { opacity: 0.9; }

    .step-dots {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(237,232,218,0.2);
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid rgba(237,232,218,0.3);
    }

    .dot.active {
      background: var(--tc);
      border-color: var(--tc);
      width: 16px;
      border-radius: 3px;
    }

    /* Step counter */
    .step-counter-display {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      color: rgba(237,232,218,0.35);
    }

    /* ── READ MODE ───────────────────────────────────── */
    #read-mode {
      padding-top: 52px;
      background: var(--black);
      min-height: 100vh;
      display: flex;
    }

    #toc {
      width: 200px;
      flex-shrink: 0;
      position: sticky;
      top: 52px;
      height: calc(100vh - 52px);
      overflow-y: auto;
      padding: 2.5rem 1.5rem 2.5rem 2rem;
    }

    @media (max-width: 800px) {
      #toc { display: none; }
    }

    .toc-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(237,232,218,0.3);
      margin-bottom: 1.25rem;
    }

    .toc-item {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      line-height: 1.6;
      color: rgba(237,232,218,0.35);
      text-decoration: none;
      padding: 4px 0 4px 10px;
      border-left: 2px solid transparent;
      margin-left: -10px;
      transition: all 0.15s;
    }

    .toc-item:hover,
    .toc-item.active {
      color: var(--tc);
      border-left-color: var(--olive);
    }

    #full-content {
      flex: 1;
      padding: 2rem clamp(1rem, 4vw, 3rem) 6rem;
    }

    /* Read section */
    .read-wrap { margin-bottom: 2.5rem; }

    .read-section-header {
      background: var(--olive);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 2rem 2.5rem;
    }

    .read-section-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(237,232,218,0.6);
      margin-bottom: 0.75rem;
    }

    .read-section-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 700;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      color: var(--tc);
      letter-spacing: -0.015em;
    }

    .read-card {
      background: var(--cream);
      border-radius: 0 0 var(--radius) var(--radius);
      padding: 2.5rem clamp(2rem, 5vw, 4rem) 3.5rem;
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.45s ease, transform 0.45s ease;
    }

    .read-card.visible {
      opacity: 1;
      transform: none;
    }

    /* Read card typography — same as step-body */
    .read-card h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 700;
      font-size: clamp(1.9rem, 4vw, 3rem);
      line-height: 1.05;
      letter-spacing: -0.01em;
      margin-bottom: 1.5rem;
    }

    .read-card h2 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 700;
      font-size: clamp(1.1rem, 2vw, 1.4rem);
      letter-spacing: -0.01em;
      margin: 2rem 0 0.75rem;
    }

    .read-card h3 {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--rose);
      margin: 1.75rem 0 0.5rem;
    }

    .read-card p {
      font-family: 'Lora', Georgia, serif;
      font-size: 1.05rem;
      line-height: 1.85;
      margin-bottom: 1.2rem;
    }

    .read-card ul,
    .read-card ol { padding-left: 1.5rem; margin-bottom: 1.2rem; }

    .read-card li {
      font-family: 'Lora', Georgia, serif;
      font-size: 1.05rem;
      line-height: 1.8;
      margin-bottom: 0.3rem;
    }

    .read-card blockquote {
      border-left: 3px solid var(--rose);
      padding: 0.5rem 0 0.5rem 1.5rem;
      margin: 1.5rem 0;
      color: var(--muted);
      font-style: italic;
    }

    .read-card hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    .read-card table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
      font-size: 0.9rem;
    }

    .read-card th {
      text-align: left;
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      padding: 0.5rem 1rem 0.5rem 0;
    }

    .read-card td {
      font-family: 'Lora', Georgia, serif;
      padding: 0.7rem 1rem 0.7rem 0;
      border-bottom: 1px solid rgba(25,42,86,0.06);
      line-height: 1.6;
      vertical-align: top;
    }

    .read-card pre {
      background: rgba(25,42,86,0.04);
      border: 1px solid rgba(25,42,86,0.08);
      border-radius: 8px;
      padding: 1.5rem 1.75rem;
      margin: 1.5rem 0;
      overflow-x: auto;
      position: relative;
    }

    .read-card code {
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      line-height: 1.7;
    }

    .read-card :not(pre) > code {
      background: rgba(25,42,86,0.06);
      padding: 0.15em 0.45em;
      border-radius: 3px;
      font-size: 0.85em;
    }

    .read-card input[type="checkbox"] {
      width: 15px; height: 15px;
      accent-color: var(--olive);
      margin-right: 0.6rem;
      cursor: pointer;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    .read-card li:has(input[type="checkbox"]) {
      list-style: none;
      margin-left: -1.5rem;
      padding: 0.3rem 0;
    }

    /* ── BOOKING ─────────────────────────────────────── */
    #booking {
      background: var(--black);
      border-top: 1px solid rgba(237,232,218,0.07);
      padding: clamp(5rem, 12vh, 9rem) clamp(1.5rem, 8vw, 7rem);
      max-width: 1200px;
      margin: 0 auto;
    }

    #booking-outer {
      background: var(--black);
      border-top: 1px solid rgba(237,232,218,0.07);
    }

    .booking-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(237,232,218,0.35);
      margin-bottom: 2rem;
    }

    .booking-headline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 700;
      font-size: clamp(2.5rem, 6vw, 5rem);
      line-height: 1.05;
      letter-spacing: -0.025em;
      color: var(--tc);
      max-width: 700px;
      margin-bottom: 1rem;
    }

    .booking-sub {
      font-family: 'Lora', Georgia, serif;
      font-size: 1.05rem;
      line-height: 1.75;
      color: rgba(237,232,218,0.5);
      max-width: 520px;
      margin-bottom: 3.5rem;
    }

    .booking-price-em {
      color: rgba(237,232,218,0.85);
      font-style: normal;
    }

    .booking-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.25rem;
      max-width: 620px;
    }

    .booking-card {
      background: rgba(237,232,218,0.05);
      border: 1px solid rgba(237,232,218,0.1);
      border-radius: var(--radius);
      padding: 2rem;
    }

    .booking-step {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(237,232,218,0.35);
      margin-bottom: 0.75rem;
    }

    .booking-card-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 700;
      font-size: 1rem;
      color: var(--tc);
      margin-bottom: 1.5rem;
    }

    .qr-placeholder {
      width: 130px; height: 130px;
      background: rgba(237,232,218,0.06);
      border: 1px dashed rgba(237,232,218,0.18);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      color: rgba(237,232,218,0.25);
      letter-spacing: 0.06em;
      text-align: center;
    }

    .qr-img {
      width: 130px; height: 130px;
      object-fit: contain;
      border-radius: 8px;
    }

    .notion-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 11px 22px;
      background: var(--cream);
      color: var(--ink);
      border: none;
      border-radius: 100px;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .notion-btn:hover { opacity: 0.85; }

    /* ── ANIMATIONS ──────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: none; }
    }

    .step-card-wrap { animation: fadeUp 0.3s ease; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(237,232,218,0.12); border-radius: 2px; }

    /* Focus visible for keyboard navigation */
    :focus-visible {
      outline: 2px solid var(--olive);
      outline-offset: 3px;
    }

    /* ── PRINT ───────────────────────────────────────── */
    @media print {
      header, #step-foot, #progress-line, .mode-toggle, #toc { display: none !important; }
      body { background: #fff; color: #000; }
      #step-mode, #read-mode { padding-top: 0; }
      #step-mode.hidden { display: block !important; }
      #read-mode.hidden { display: none !important; }
      .step-scroll { overflow: visible; padding: 1rem; }
      .section-band { background: #B85C38 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .step-card, .read-card { box-shadow: none; }
      .step-card-wrap { animation: none; margin: 1rem 0; }
    }

    /* ── SECTION FIRST-PART BAND ─────────────────────── */
    .section-band--first {
      padding: 2.25rem 2.5rem;

    markdown: `# Por qué esto es diferente a todo lo que te dijeron sobre buscar trabajo

La mayoría de los consejos sobre trabajo remoto que encontrás en internet están escritos para personas que ya tienen:
- Un portafolio
- Experiencia comprobable
- Inglés avanzado

Vos probablemente no tenés ninguna de esas cuatro cosas. Y eso está bien. Porque el método que vas a aprender no las necesita como punto de partida.

PPV (Permissionless Value Proposition) es una estrategia que invierte el orden lógico de la búsqueda de trabajo:

| Búsqueda tradicional | PPV |
|---------------------|-----|
| Manda CV → espera → quizás te llaman | Investigás la empresa → identificás un problema real → creás la solución → la mandás → pedís 15 minutos |

La frase central del método:

/* ──────────────────────────────────────────────────────
   HELPERS
   ────────────────────────────────────────────────────── */
function getSectionFor(idx) {
  return sections.find(s => s.parts.includes(idx));
}

function getSectionDots(sectionObj, currentIdx) {
  return sectionObj.parts.map(i => `<div class="band-dot ${i === currentIdx ? 'filled' : ''}"></div>`).join('');
}

/* ──────────────────────────────────────────────────────
   INIT
   ────────────────────────────────────────────────────── */
document.getElementById('precio-display').textContent =
  CONFIG.precio !== "XX" ? CONFIG.precio + " USD ·" : "[precio] USD ·";

const notionLink = document.getElementById('notion-link');
if (CONFIG.notionURL !== "TU_URL_AQUI") notionLink.href = CONFIG.notionURL;

// Hash-based navigation: #parte-3 → step 2
function stepFromHash() {
  const m = location.hash.match(/^#parte-(\d+)$/);
  if (m) return Math.min(parseInt(m[1]) - 1, partes.length - 1);
  return null;
}

let currentStep = stepFromHash() ?? parseInt(localStorage.getItem('ppv-step') ?? '-1');
let currentMode = localStorage.getItem('ppv-mode') || 'step';

// Configure marked — use a renderer that keeps output safe for static content
marked.setOptions({ breaks: true });

// Build step dots (buttons for accessibility)
const dotsEl = document.getElementById('step-dots');
partes.forEach((_, i) => {
  const d = document.createElement('button');
  d.type = 'button';
  d.className = 'dot';
  d.setAttribute('aria-label', 'Ir a parte ' + (i + 1) + ': ' + partes[i].titulo);
  d.onclick = () => goTo(i);
  dotsEl.appendChild(d);
});

setMode(currentMode, true);

/* ──────────────────────────────────────────────────────
   MODE TOGGLE
   ────────────────────────────────────────────────────── */
function setMode(mode, skipSave) {
  currentMode = mode;
  if (!skipSave) localStorage.setItem('ppv-mode', mode);

  document.getElementById('btn-step').classList.toggle('active', mode === 'step');
  document.getElementById('btn-read').classList.toggle('active', mode === 'read');
  document.getElementById('step-mode').classList.toggle('hidden', mode !== 'step');
  document.getElementById('step-foot').classList.toggle('hidden', mode !== 'step');
  document.getElementById('read-mode').classList.toggle('hidden', mode !== 'read');

  if (mode === 'step') renderStep(currentStep);
  else renderReadMode();
}

/* ──────────────────────────────────────────────────────
   STEP MODE
   ────────────────────────────────────────────────────── */
let showingCover = false;

function goTo(idx) {
  const prevStep = currentStep;
  currentStep = Math.max(-1, Math.min(partes.length - 1, idx));
  localStorage.setItem('ppv-step', currentStep);
  const hash = currentStep >= 0 ? '#parte-' + (currentStep + 1) : '#inicio';
  history.replaceState(null, '', hash);

  // Show section cover when moving forward into the first part of a new section
  if (currentStep >= 0 && isFirstOfSection(currentStep) && idx > prevStep) {
    showingCover = true;
    renderSectionCover(currentStep);
  } else {
    showingCover = false;
    renderStep(currentStep);
  }
}

function navigate(dir) {
  // From cover: Next → show content, Prev → go back one step
  if (showingCover) {
    if (dir === 1) { showingCover = false; renderStep(currentStep); return; }
    if (dir === -1) { showingCover = false; goTo(currentStep - 1); return; }
  }
  // From first of section going back → show that section's cover
  if (dir === -1 && currentStep > 0 && isFirstOfSection(currentStep)) {
    showingCover = true;
    renderSectionCover(currentStep);
    return;
  }
  goTo(currentStep + dir);
}

function renderSectionCover(idx) {
  const section    = getSectionFor(idx);
  const sectionIdx = sections.indexOf(section);
  const band       = document.getElementById('section-band');
  const partLabel  = document.getElementById('part-label');
  const contentEl  = document.getElementById('step-content');
  const wrap       = document.getElementById('step-card-wrap');
  const card       = document.querySelector('.step-card');

  // Animate
  wrap.style.animation = 'none';
  void wrap.offsetWidth;
  wrap.style.animation = '';

  band.style.display = 'none';
  partLabel.style.display = 'none';
  document.querySelector('.step-scroll').style.padding = '0';
  wrap.style.cssText = 'margin:0; max-width:none; border-radius:0;';
  card.className = 'step-card section-cover-card';

  contentEl.innerHTML = `
    <div class="cover-content">
      <div class="cover-section-num">Sección 0${sectionIdx + 1} &nbsp;·&nbsp; ${section.parts.length} partes</div>
      <div class="cover-section-name">${section.label}.</div>
      <div class="cover-parts-list">${section.parts.map(i => '→ ' + partes[i].titulo).join('<br>')}</div>
      <button class="cover-continue-btn" onclick="showingCover=false; renderStep(${idx})">Comenzar →</button>
    </div>`;

  document.getElementById('progress-line').style.width = (idx / partes.length * 100) + '%';
  document.getElementById('btn-prev').disabled = idx === 0 && sectionIdx === 0;
  document.getElementById('btn-prev').onclick = () => navigate(-1);
  const btnNext = document.getElementById('btn-next');
  btnNext.textContent = 'Comenzar →';
  btnNext.onclick = () => { showingCover = false; renderStep(idx); };

  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === idx));
  document.title = section.label + ' — PPV';
  document.querySelector('.step-scroll').scrollTop = 0;
}

function isFirstOfSection(idx) {
  return sections.some(s => s.parts[0] === idx);
}

function renderStep(idx) {
  const band       = document.getElementById('section-band');
  const bandLabel  = document.getElementById('section-band-label');
  const bandDots   = document.getElementById('section-band-dots');
  const partLabel  = document.getElementById('part-label');
  const contentEl  = document.getElementById('step-content');
  const wrap       = document.getElementById('step-card-wrap');

  // Animate
  wrap.style.animation = 'none';
  void wrap.offsetWidth;
  wrap.style.animation = '';

  // Scroll to top
  document.querySelector('.step-scroll').scrollTop = 0;

  /* ── INTRO SLIDE (idx = -1) ── */
  if (idx === -1) {
    band.style.display = 'none';
    partLabel.style.display = 'none';
    document.getElementById('progress-line').style.width = '0%';
    document.getElementById('btn-prev').disabled = true;
    const btnNext = document.getElementById('btn-next');
    btnNext.textContent = 'Empezar →';
    btnNext.onclick = () => goTo(0);
    document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));

    // Hero — force full viewport width with inline styles
    document.querySelector('.step-card').classList.add('intro-card-hero');
    document.querySelector('.step-scroll').style.padding = '0';
    wrap.style.cssText = 'margin:0; max-width:none; border-radius:0;';
    document.getElementById('booking-outer').style.display = 'none';

    contentEl.innerHTML = `
      <div class="intro-hero-text">
        <p class="intro-overline">Trabajo remoto desde Bolivia</p>
        <h1 class="intro-title">Cómo conseguir trabajo remoto sin pedir permiso.</h1>
        <button class="intro-cta-btn" onclick="goTo(0)">Leer el método →</button>
      </div>
      <div class="intro-hero-visual"></div>`;
    document.title = 'PPV — Trabajo remoto desde Bolivia';
    return;
  }

  /* ── NORMAL STEPS ── */
  // Restore card styles from any special state
  const card = document.querySelector('.step-card');
  card.className = 'step-card';
  document.querySelector('.step-scroll').style.padding = '';
  wrap.style.cssText = '';
  document.getElementById('booking-outer').style.display = '';

  const parte   = partes[idx];
  const section = getSectionFor(idx);
  const first   = isFirstOfSection(idx);

  // Section band
  band.style.display = '';
  band.className = 'section-band' + (first ? ' section-band--first' : '');

  if (first) {
    const sectionIdx = sections.indexOf(section);
    bandLabel.innerHTML = `
      <span class="section-num">Sección 0${sectionIdx + 1}</span>
      <span class="section-name-big">${section.label}</span>`;
    bandDots.innerHTML = getSectionDots(section, idx);
  } else {
    bandLabel.innerHTML = section ? section.label : '';
    bandDots.innerHTML = section ? getSectionDots(section, idx) : '';
  }

  // Part label
  partLabel.style.display = '';
  partLabel.textContent =
    'Parte ' + String(idx + 1).padStart(2, '0') + ' · ' + String(partes.length).padStart(2, '0');

  // Content
  contentEl.innerHTML = marked.parse(parte.markdown);

  // Progress line
  document.getElementById('progress-line').style.width =
    ((idx + 1) / partes.length * 100) + '%';

  // Nav buttons
  document.getElementById('btn-prev').disabled = false;
  document.getElementById('btn-prev').onclick = () => navigate(-1);
  const btnNext = document.getElementById('btn-next');
  if (idx === partes.length - 1) {
    btnNext.textContent = 'Ver asesoría ↓';
    btnNext.onclick = () => document.getElementById('booking-outer').scrollIntoView({ behavior: 'smooth' });
  } else {
    btnNext.textContent = 'Siguiente →';
    btnNext.onclick = () => navigate(1);
  }

  // Dots
  document.querySelectorAll('.dot').forEach((d, i) =>
    d.classList.toggle('active', i === idx)
  );

  // Dynamic title
  document.title = 'Parte ' + (idx + 1) + ' · ' + parte.titulo + ' — PPV';

  // Post-render
  attachCheckboxes(contentEl, 'step-' + idx);
  attachCopyButtons(contentEl);
}

/* ──────────────────────────────────────────────────────
   READ MODE
   ────────────────────────────────────────────────────── */
function renderReadMode() {
  const tocEl = document.getElementById('toc-links');
  const fullEl = document.getElementById('full-content');
  tocEl.innerHTML = '';
  fullEl.innerHTML = '';

  sections.forEach((section, si) => {
    section.parts.forEach((partIdx, pi) => {
      const parte = partes[partIdx];

      const wrap = document.createElement('div');
      wrap.className = 'read-wrap';
      wrap.id = 'read-' + partIdx;

      // Section band only on first part of each section
      if (pi === 0) {
        const band = document.createElement('div');
        band.className = 'read-section-header';
        band.innerHTML = `
          <div class="read-section-label">Sección ${si + 1}</div>
          <div class="read-section-title">${section.label}</div>
        `;
        wrap.appendChild(band);
      }

      const card = document.createElement('div');
      card.className = 'read-card' + (pi === 0 ? '' : ' read-card--notop');
      if (pi > 0) card.style.borderRadius = 'var(--radius)';
      card.style.marginTop = pi > 0 ? '1.25rem' : '0';
      card.innerHTML = marked.parse(parte.markdown);
      wrap.appendChild(card);

      fullEl.appendChild(wrap);

      // TOC
      const a = document.createElement('a');
      a.href = '#read-' + partIdx;
      a.className = 'toc-item';
      a.textContent = parte.titulo;
      tocEl.appendChild(a);

      // Post-render
      attachCheckboxes(card, 'read-' + partIdx);
      attachCopyButtons(card);
    });
  });

  // Intersection observer
  const obs = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.querySelector('.read-card')?.classList.add('visible');
        const id = entry.target.id;
        document.querySelectorAll('.toc-item').forEach(a =>
          a.classList.toggle('active', a.getAttribute('href') === '#' + id)
        );
      }
    });
  }, { threshold: 0.06, rootMargin: '-52px 0px 0px 0px' });

  document.querySelectorAll('.read-wrap').forEach(s => obs.observe(s));
}

/* ──────────────────────────────────────────────────────
   COPY BUTTONS
   ────────────────────────────────────────────────────── */
function attachCopyButtons(container) {
  container.querySelectorAll('pre').forEach(pre => {
    if (pre.querySelector('.copy-btn')) return;
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = 'Copiar';
    btn.onclick = () => {
      const code = pre.querySelector('code')?.innerText || pre.innerText;
      navigator.clipboard.writeText(code).then(() => {
        btn.textContent = '✓ Copiado';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 2000);
      });
    };
    pre.appendChild(btn);
  });
}

/* ──────────────────────────────────────────────────────
   CHECKBOXES
   ────────────────────────────────────────────────────── */
function attachCheckboxes(container, namespace) {
  container.querySelectorAll('input[type="checkbox"]').forEach((cb, i) => {
    const key = 'ppv-check-' + namespace + '-' + i;
    cb.checked = localStorage.getItem(key) === '1';
    cb.addEventListener('change', () => localStorage.setItem(key, cb.checked ? '1' : '0'));
  });
}

/* ──────────────────────────────────────────────────────
   KEYBOARD NAV
   ────────────────────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (currentMode !== 'step') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigate(-1);
});
</script>
