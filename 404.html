<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada — PVP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Space+Mono&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23192A56'/><text x='50%25' y='54%25' font-family='Georgia,serif' font-size='18' font-weight='700' fill='%23F7D794' text-anchor='middle' dominant-baseline='middle'>P</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0B0B09;
      color: #EDE8DA;
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .num {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(6rem, 20vw, 14rem);
      font-weight: 700;
      color: #F7D794;
      line-height: 1;
      letter-spacing: -0.04em;
    }
    .label {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(237,232,218,0.4);
      margin: 1.5rem 0 3rem;
    }
    .back {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 12px 28px;
      background: #EDE8DA;
      color: #192A56;
      text-decoration: none;
      border-radius: 100px;
      transition: opacity 0.15s;
    }
    .back:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="num">404</div>
  <p class="label">Esta página no existe</p>
  <a href="/" class="back">Volver al inicio →</a>
</body>
</html>
